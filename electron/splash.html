<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ISKonomy Loading</title>
  <style>
    body {
      background-color: #121217;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      overflow: hidden;
    }

    .splash-container {
      position: relative;
      width: 320px;
      height: 320px;
    }

    .splash-container img {
      width: 320px;
      height: 320px;
    }

    .version {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.85rem;
      color: #bbb;
      font-family: monospace;
      user-select: none;
    }

    /* Base "Loading..." line */
    .splash-text {
      position: absolute;
      bottom: 52px;
      width: 100%;
      text-align: center;
      font-family: sans-serif;
      font-size: 1rem;
      color: white;
      text-shadow: 0 0 3px black;
      user-select: none;
    }

    /* Dynamic boot progress line */
    #statusText {
      position: absolute;
      bottom: 34px;
      width: 100%;
      text-align: center;
      font-family: sans-serif;
      font-size: 0.85rem;
      color: #cfe8ff;
      opacity: 0.9;
      text-shadow: 0 0 3px black;
      padding: 0 12px;
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
    }

    .dots::after {
      content: '...';
      animation: blink 1.2s steps(3, end) infinite;
    }

    .loading-bar {
      position: absolute;
      bottom: 18px;
      left: 10%;
      width: 80%;
      height: 6px;
      background-color: #2a2a38;
      border-radius: 3px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      width: 0%;
      background-color: #61dafb;

      /* Loop instead of "complete and stop" */
      animation: fillBar 1.8s ease-in-out infinite;
    }

    @keyframes fillBar {
      0%   { width: 0%; opacity: 0.6; }
      60%  { width: 100%; opacity: 1; }
      100% { width: 100%; opacity: 0.0; }
    }

    @keyframes blink {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="version">
      <script>
        const version = require('../package.json').version;
        document.currentScript.parentElement.textContent = `v${version}`;
      </script>
    </div>

    <img id="logo" alt="ISKonomy Logo">

    <script>
      const { ipcRenderer } = require("electron");

      ipcRenderer.on("logo-path", (_event, logoUrl) => {
        document.getElementById("logo").src = logoUrl;
      });

      // NEW: receive boot progress text from main process
      ipcRenderer.on("boot:progress", (_event, msg) => {
        const el = document.getElementById("statusText");
        if (el) el.textContent = String(msg || "");
      });
    </script>

    <div class="splash-text">
      Loading<span class="dots"></span>
    </div>

    <!-- NEW: dynamic status line -->
    <div id="statusText">Starting…</div>

    <div class="loading-bar">
      <div class="loading-fill"></div>
    </div>
  </div>
</body>
</html>
